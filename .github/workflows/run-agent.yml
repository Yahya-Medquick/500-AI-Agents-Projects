name: Execute Specialist Agent

on:
  workflow_dispatch:
    inputs:
      agent_folder:
        description: 'Target agent folder name'
        required: true
      task_input:
        description: 'Formatted prompt or instruction'
        required: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Specialist Code
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TASK_PROMPT: ${{ github.event.inputs.task_input }}
        run: |
          cd agents/${{ github.event.inputs.agent_folder }}
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python agent.py
